<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Nest</title>
     <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
     <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#5B5FEF",
                        secondary: "#10B981",
                        accent: "#38BDF8",

                        gradientStart: "#5B5FEF",
                        gradientEnd: "#10B981",

                        background: "#F8FAFC",
                        paragraph: "#64748B",

                        btnPrimary: "#2563EB",
                        btnHover: "#48EBFA",

                        heading: "#0F172A",
                        cardBg: "#3D293B"
                    },

                    fontFamily: {
                        main: ["Poppins", "sans-serif"],
                        body: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body>


<!-- navbar -->

<div class="w-full">
    <div class="container mx-auto px-4 rounded-xl flex items-center py-4 justify-between shadow-lg">
        <div class="logo flex ">
            <img class="w-full mr-1" src="images/logo.png">
        <h2 class="text-3xl font-bold text-heading text-main">Smart<span class="text-[#06B6D4]">Nest</span></h2>
        </div>
        <div class="navmenu hidden lg:block">
            <ul class="list-none flex items-center gap-5">
                <li class="text-md text-[#5B5FEF] font-medium"><a class="decoration-none px-4 py-2" href="#">Home</a></li>
                <li class="text-md text-[#64748B] hover:text-[#5B5FEF]  font-medium"><a class="decoration-none px-4 py-2" href="#">Features</a></li>
                <li class="text-md text-[#64748B] hover:text-[#5B5FEF] font-medium"><a class="decoration-none px-4 py-2" href="#">Design</a></li>
                <li class="text-md text-[#64748B] hover:text-[#5B5FEF] font-medium"><a class="decoration-none px-4 py-2" href="#">Pricing</a></li>
                <li class="text-md text-[#64748B] hover:text-[#5B5FEF] font-medium"><a class="decoration-none px-4 py-2" href="#">Contact</a></li>
            </ul>
        </div>
        <div class="buttons flex items-center gap-4">
            <div class=" flex gap-4 items-center">
            <a class="md:inline-block hidden text-md px-3 py-2  text-[#0F172A] hover:text-primary  hover:bg-gray-100 transition-all duration-300 rounded-lg" href="#">Log In</a>
            <a class=" md:inline-block hidden bg-gradient-to-r from-gradientStart to-gradientEnd text-md px-3 py-2 rounded-xl text-white shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300 ease" href="#">Get Started</a>
            </div>
            <div class="toggle-mobile text-2xl  block lg:hidden px-3"><i class="fa-solid fa-bars text-heading flex items-center"></i></div>
        </div>
    </div>
</div>


   
    
</body>
</html>
